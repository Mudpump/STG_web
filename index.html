<html lang="ko">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
  <title>세특각 - 훔쳐보는 입시 정보</title>
  <meta name="google-site-verification" content="y70maJ_m7qqG3d7-CQTDZHH_XvpQOtUXnH693iElCrE" />
  <meta name="description" content="세특각 - 고등학생 세특(세부능력 및 특기사항) 탐구 커뮤니티. AI 교수님과 조교가 함께하는 탐구 주제 찾기, 이슈 분석, 토론까지." />
  <meta name="keywords" content="세특, 세부능력특기사항, 생기부, 입시, 탐구주제, 고등학생, 대입, 학생부종합전형" />
  <link rel="canonical" href="https://angle-angle.vercel.app/" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="세특각 - 훔쳐보는 입시 정보" />
  <meta property="og:description" content="AI 교수님과 조교가 함께하는 세특 탐구 커뮤니티. 탐구 주제, 이슈 분석, 토론까지." />
  <meta property="og:url" content="https://angle-angle.vercel.app/" />
  <meta property="og:site_name" content="세특각" />
  <meta property="og:locale" content="ko_KR" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: {
              DEFAULT: '#8B5CF6', // Violet 500 (감각적이고 트렌디한 보라색)
              light: '#A78BFA',    // Violet 400
              dark: '#7C3AED',     // Violet 600
              soft: '#F5F3FF',     // Violet 50 (배경용)
            },
            secondary: {
              DEFAULT: '#10B981', // Emerald 500 (성장, 긍정)
              light: '#34D399',
              dark: '#059669',
            },
            accent: {
              DEFAULT: '#F472B6', // Pink 400 (활기찬 포인트)
              light: '#FBCFE8',
              dark: '#DB2777',
            },
            gray: {
              50: '#F9FAFB',
              100: '#F3F4F6',
              200: '#E5E7EB',
              300: '#D1D5DB',
              400: '#9CA3AF',
              500: '#6B7280',
              600: '#4B5563',
              700: '#374151',
              800: '#1F2937',
              900: '#111827',
            }
          },
          fontFamily: {
            sans: ['Pretendard', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica', 'Arial', 'sans-serif'],
            logo: ['Jua', 'sans-serif'],
          },
          boxShadow: {
            'soft': '0 4px 20px -2px rgba(139, 92, 246, 0.1)', // 보라빛이 감도는 부드러운 그림자
            'glow': '0 0 15px rgba(139, 92, 246, 0.3)', // 강조 효과용
          },
          animation: {
            'fade-in': 'fadeIn 0.5s ease-out',
            'fade-in-up': 'fadeInUp 0.5s ease-out',
            'bounce-slight': 'bounceSlight 2s infinite',
            'wave': 'wave 2.5s infinite',
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            },
            fadeInUp: {
              '0%': { opacity: '0', transform: 'translateY(10px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            bounceSlight: {
              '0%, 100%': { transform: 'translateY(-5%)' },
              '50%': { transform: 'translateY(0)' },
            },
            wave: {
              '0%': { transform: 'rotate(0.0deg)' },
              '10%': { transform: 'rotate(14.0deg)' },
              '20%': { transform: 'rotate(-8.0deg)' },
              '30%': { transform: 'rotate(14.0deg)' },
              '40%': { transform: 'rotate(-4.0deg)' },
              '50%': { transform: 'rotate(10.0deg)' },
              '60%': { transform: 'rotate(0.0deg)' },
              '100%': { transform: 'rotate(0.0deg)' },
            },
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
    @import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');

    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .pb-safe-bottom {
      padding-bottom: env(safe-area-inset-bottom, 20px);
    }

    body {
      background-color: #F8FAFC;
      /* 쿨톤 그레이로 깔끔함 강조 */
      font-family: 'Pretendard', sans-serif;
      overflow-x: hidden;
    }

    .font-logo {
      font-family: 'Jua', sans-serif;
    }

    /* Hide scrollbar for Chrome, Safari and Opera */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    /* Hide scrollbar for IE, Edge and Firefox */
    .no-scrollbar {
      -ms-overflow-style: none;
      /* IE and Edge */
      scrollbar-width: none;
      /* Firefox */
    }
  </style>

  <link rel="stylesheet" href="/index.css">
</head>
